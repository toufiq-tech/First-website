<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign up</title>
    <link rel="stylesheet" href="First.css">
</head>
<marquee >Sign up for free</marquee>
<body >
    <h1 align="center">Sign up</h1> 
    <hr>
<label for="user">Name :</label>
<input type="text" id="user" name="user" placeholder="User Name"><br>
<label for="usr">Father's name :</label>
<input type="usr" id="usr" name="user"><br>
<label for="usr2">Mother's name :</label>
<input type="usr2" id="usr2" name="user"><br>
<label for="cntry">Country</label>
<input list="cntry">
<datalist id="cntry">
    <option value="Bangladesh"></option>
    <option value="India"></option>
    <option value="Nepal"></option>
    <option value="Mayanmar"></option>
</datalist><br>
<label for="email">Email :</label>
<input type="email" id="email" name="user mail" placeholder="User Mail" required><br>
<label for="Pass">Password :</label>
<input type="password" id="Pass" placeholder=" Enter Password"><br>
<label for="phn">Phone :</label>
<br>
<select name="code" >
    <option value="+880">+880</option>
    <option value="+990">+990</option>
    <option value="+110">+110</option>
</select>
<input type="number" id="phn" name="phone" placeholder="123456789" required><br>
<label for="user">Gender :</label>
<input type="radio" id="gndr1" name="user">
<label for="gndr1">Male</label>
<input type="radio" id="gndr2" name="user">
<label for="gndr2">Female</label><br>
<label for="date">Date of birth :</label>
<input type="date" name="date" id="date"><br>
<label for="time">Time :</label>
<input type="time" name="time" id="time"><br>
<label for="colours">Favourite colour :</label>
<input type="color" name="colours" id="colours"><br>
<label for="file">User's photo :</label>
<input type="file" name="file" id="file"><br>
<input type="checkbox" name="vehicle" id="vehicle">
<label for="vehicle">I have a bike</label>
<input type="checkbox" name="vehicle" id="vehicle">
<label for="vehicle">I have a car</label><br>
<textarea name="cmnt">comment here</textarea><br>
<button>Submit</button><button>Refresh</button>
<h3 align="center">After submitting your data</h3>
<p align="center"><a href="first-website.html">Click here</a></p>
</body>
</html>
